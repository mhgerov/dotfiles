[colors]
background = #151100
background-alt = #1d1600
foreground = #ffd86b
primary = #ffb000
primary-soft = #ffc94d
muted = #805a00

cyan = #89ddff
purple = #c792ea
green = #a3be8c
orange = #ff8f00

alert = #ff8f00
disabled = #805a00

[bar/base]
monitor = ${env:MONITOR:}
monitor-strict = true

width = 100%
height = 28
bottom = true
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-size = 0

padding-left = 1
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.muted}

font-0 = "IBM Plex Mono:size=10;2"
font-1 = "IBM Plex Mono:style=Bold:size=10;2"

modules-left = i3 xwindow
modules-center =
modules-right = cpu memory pulseaudio wlan ethernet date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
override-redirect = false
[bar/main]
inherit = bar/base
modules-right = cpu memory pulseaudio wlan ethernet date

[bar/secondary]
inherit = bar/base
modules-right = date

[module/tray]
type = internal/tray

format-margin = 4px
tray-spacing = 6px
tray-background = ${colors.background}

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
wrapping-scroll = false
strip-wsnumbers = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.background}
label-mode-background = ${colors.purple}

label-focused = %name%
label-focused-padding = 1
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}

label-unfocused = %name%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.foreground}
label-unfocused-background = ${colors.background}

label-visible = %name%
label-visible-padding = 1
label-visible-foreground = ${colors.primary-soft}
label-visible-background = ${colors.background}

label-urgent = %name%
label-urgent-padding = 1
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.orange}

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.cyan}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.cyan}
label = %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 2

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary-soft}
format-volume = <label-volume>

label-volume = %percentage%%

format-muted-prefix = "VOL "
format-muted-prefix-foreground = ${colors.muted}
label-muted = muted
label-muted-foreground = ${colors.muted}

click-right = pavucontrol

[module/wlan]
type = internal/network
interface = wlp42s0
interface-type = wireless
interval = 3

format-connected = <label-connected>
format-connected-prefix = "WIFI "
format-connected-prefix-foreground = ${colors.green}

label-connected = %essid% %local_ip%

format-disconnected = <label-disconnected>
format-disconnected-prefix = "WIFI "
format-disconnected-prefix-foreground = ${colors.muted}
label-disconnected = down
label-disconnected-foreground = ${colors.muted}

[module/ethernet]
type = internal/network
interface = enp43s0
interface-type = wired
interval = 3

format-connected = <label-connected>
format-connected-prefix = "ETH "
format-connected-prefix-foreground = ${colors.green}
label-connected = %local_ip%

format-disconnected = <label-disconnected>
format-disconnected-prefix = "ETH "
format-disconnected-prefix-foreground = ${colors.muted}
label-disconnected = down
label-disconnected-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d
time = %H:%M:%S

format-prefix-foreground = ${colors.primary-soft}
label = %date% %time%

[settings]
screenchange-reload = true
pseudo-transparency = false
