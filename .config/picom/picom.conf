backend = "glx";
vsync = true;

# Transparency
inactive-opacity = 0.8;
active-opacity = 0.9;
frame-opacity = 0.9;

# Optional: make unfocused windows more transparent
inactive-opacity-override = false;

# Fading (nice touch)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Blur
blur-method = "dual_kawase";
blur-strength = 5;

# Corner Rounding
corner-radius = 8;
blur-method = "dual_kawase";
blur-strength = 3;

active-opacity = 0.95;
inactive-opacity = 0.9;
