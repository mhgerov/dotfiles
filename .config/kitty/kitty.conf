# ─────────────────────────────────────────
# Augmented Amber — kitty.conf
# ─────────────────────────────────────────

# Fonts
font_family      IBM Plex Mono
bold_font        IBM Plex Mono Bold
italic_font      IBM Plex Mono Italic
bold_italic_font IBM Plex Mono Bold Italic
font_size        12.0
disable_ligatures never

# Spacing / Layout
adjust_line_height  120%
adjust_column_width 0

# ─── Colors ───────────────────────────────

# Base
background            #0c0b00
foreground            #ffd86b
selection_background  #ffb000
selection_foreground  #0c0b00

# Cursor
cursor                #ffb000
cursor_text_color     #0c0b00
cursor_shape          block
cursor_blink_interval 0

# URL highlight
url_color             #89ddff
url_style             single

# ─── ANSI 16 Colors ───────────────────────

# Black (dim/bright) — warm near-black tones
color0  #0c0b00
color8  #1d1600

# Red — muted, not harsh (warnings)
color1  #cc5500
color9  #ff8f00

# Green — strings / success
color2  #a3be8c
color10 #b8d4a0

# Yellow — primary amber
color3  #ffb000
color11 #ffd86b

# Blue — functions/types (soft cyan stands in)
color4  #5a9db5
color12 #89ddff

# Magenta — keywords / control flow
color5  #c792ea
color13 #d4a8f0

# Cyan — functions/highlights
color6  #89ddff
color14 #a8e8ff

# White (foreground shades) — avoid pure white
color7  #ffc94d
color15 #ffd86b

# ─── Window / Borders ─────────────────────

window_border_width        1px
active_border_color        #ffb000
inactive_border_color      #1d1600
bell_border_color          #ff8f00

draw_minimal_borders       yes
window_padding_width       8

# Transparency — "glass over amber glow"
background_opacity         0.94
dynamic_background_opacity no

# ─── Tab Bar ──────────────────────────────

tab_bar_style              separator
tab_separator              " │ "
tab_bar_background         #151100
active_tab_foreground      #0c0b00
active_tab_background      #ffb000
active_tab_font_style      bold
inactive_tab_foreground    #805a00
inactive_tab_background    #151100
inactive_tab_font_style    normal

# ─── Misc ─────────────────────────────────

scrollback_lines           10000
enable_audio_bell          no
visual_bell_duration       0.1
copy_on_select             no
strip_trailing_spaces      smart
